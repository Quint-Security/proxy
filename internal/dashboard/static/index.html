<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quint Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@1,2&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000; --surface: #0A0A0A; --surface-2: #141414; --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.15); --dim: rgba(255,255,255,0.04);
  --text: #FFFFFF; --text-2: #A0A0A0; --text-3: #666666;
  --green: #00ffc8; --green-dim: rgba(0,255,200,0.08);
  --red: #ff4f5e; --red-dim: rgba(255,79,94,0.1);
  --amber: #ffb340; --amber-dim: rgba(255,179,64,0.1);
  --blue: #4a9eff; --blue-dim: rgba(74,158,255,0.1);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.1);
  --sans: 'Switzer', -apple-system, system-ui, sans-serif;
  --mono: 'DM Mono', 'SF Mono', ui-monospace, monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--green);color:var(--bg)}
body{font-family:var(--mono);background:var(--bg);color:var(--text-2);font-size:13px;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}

/* Layout */
.shell{display:grid;grid-template-columns:56px 1fr;grid-template-rows:48px 1fr;height:100vh}

/* Top bar */
.topbar{grid-column:1/-1;background:rgba(5,5,8,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:10}
.topbar .logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--text)}
.topbar .logo b{font-weight:700}
.topbar .sep{width:1px;height:18px;background:var(--border)}
.topbar .status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3)}
.topbar .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar .counter{font-family:var(--mono);font-size:11px;color:var(--text-3);padding:4px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px}
.sidebar a{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text-3);transition:all 0.2s;cursor:pointer;text-decoration:none;position:relative}
.sidebar a:hover{background:var(--dim);color:var(--text-2)}
.sidebar a.active{color:var(--green);background:var(--green-dim)}
.sidebar a.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--green);border-radius:0 2px 2px 0}
.sidebar a svg{width:18px;height:18px}
.sidebar .spacer{flex:1}
.sidebar .badge-count{position:absolute;top:4px;right:4px;min-width:14px;height:14px;border-radius:7px;background:var(--amber);color:var(--bg);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* Main content */
main{overflow-y:auto;padding:24px 28px;background:var(--bg)}
main::-webkit-scrollbar{width:5px}
main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
main::-webkit-scrollbar-track{background:transparent}

/* Page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-header h1{font-family:var(--sans);font-size:20px;font-weight:300;color:var(--text);letter-spacing:-0.01em}
.page-header .actions{display:flex;gap:8px}

/* Stats grid */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:border-color 0.2s}
.stat:hover{border-color:var(--border-hover)}
.stat .label{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:8px;font-family:var(--mono);font-weight:400}
.stat .value{font-family:var(--sans);font-size:28px;font-weight:300;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.stat .value.green{color:var(--green)}.stat .value.red{color:var(--red)}.stat .value.amber{color:var(--amber)}

/* Feed / Section */
.feed{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.feed-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.feed-header h2{font-family:var(--sans);font-size:13px;font-weight:400;color:var(--text)}
.feed-header .live{display:flex;align-items:center;gap:6px;font-size:0.6rem;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;font-weight:500;font-family:var(--mono)}
.feed-header .live .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);font-weight:400;border-bottom:1px solid var(--border);font-family:var(--mono);position:sticky;top:0;background:var(--surface);z-index:1}
td{padding:10px 14px;border-bottom:1px solid var(--dim);font-size:12px;vertical-align:middle}
tr{transition:background 0.15s}
tr:hover td{background:var(--dim)}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:0.6rem;font-weight:500;letter-spacing:0.5px;font-family:var(--mono);text-transform:uppercase}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-red{background:var(--red-dim);color:var(--red)}
.tag-amber{background:var(--amber-dim);color:var(--amber)}
.tag-blue{background:var(--blue-dim);color:var(--blue)}
.tag-purple{background:var(--purple-dim);color:var(--purple)}
.tag-muted{background:rgba(102,102,102,0.12);color:var(--text-3)}

/* Risk bar */
.risk-bar{display:inline-flex;align-items:center;gap:6px}
.risk-bar .bar{width:40px;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden}
.risk-bar .bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.risk-bar .bar-fill.lo{background:var(--green)}.risk-bar .bar-fill.md{background:var(--amber)}.risk-bar .bar-fill.hi{background:var(--red)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all 0.2s}
.btn:hover{border-color:var(--border-hover);color:var(--text)}
.btn-primary{background:var(--text);border-color:var(--text);color:var(--bg);font-weight:500}
.btn-primary:hover{opacity:0.9}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:4px 10px;font-size:11px}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
input,select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;transition:border-color 0.2s}
input:focus,select:focus{border-color:var(--green)}
input::placeholder{color:var(--text-3)}
option{background:var(--surface);color:var(--text)}

/* Pagination */
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.pagination .info{font-size:11px;color:var(--text-3)}

/* Section */
.section{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.section-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-header h2{font-family:var(--sans);font-size:13px;font-weight:400;color:var(--text)}
.section-body{padding:16px 18px}

/* Create agent form */
.create-form{background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:20px;margin-bottom:16px;display:none}
.create-form.show{display:block;animation:slideDown 0.2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.form-row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.form-row label{font-size:0.6rem;color:var(--text-3);min-width:60px;text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.form-row input,.form-row select{flex:1}
.key-display{background:var(--bg);border:1px solid var(--green);border-radius:8px;padding:14px;margin-top:14px;font-size:11px;word-break:break-all;color:var(--green);line-height:1.6}

/* Approval card */
.approval-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-start;transition:border-color 0.2s}
.approval-card:hover{border-color:var(--amber)}
.approval-card .meta{display:flex;flex-direction:column;gap:6px}
.approval-card .meta .tool{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text)}
.approval-card .meta .details{font-size:11px;color:var(--text-3);display:flex;gap:12px}
.approval-card .meta .id{font-size:10px;color:var(--text-3);font-family:var(--mono)}
.approval-card .actions{display:flex;gap:8px;flex-shrink:0}

/* Policy viewer */
.policy-viewer{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.policy-viewer pre{padding:20px;font-size:12px;line-height:1.8;color:var(--text-2);white-space:pre-wrap;max-height:calc(100vh - 200px);overflow:auto}

/* Empty state */
.empty{text-align:center;padding:48px 24px;color:var(--text-3);font-size:12px}
.empty .icon{font-size:32px;margin-bottom:12px;opacity:0.15}
.waiting{animation:waitPulse 3s ease-in-out infinite}
@keyframes waitPulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* Page transitions */
.tab{display:none;animation:fadeIn 0.2s ease}
.tab.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Services */
.service-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.service-row:last-child{border-bottom:none}
.service-icon{width:32px;height:32px;border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);color:var(--text-3)}
.service-info{flex:1}
.service-info .name{font-weight:500;color:var(--text);font-size:13px;font-family:var(--sans)}
.service-info .scopes{font-size:11px;color:var(--text-3);margin-top:2px}

/* New entry highlight */
.new-entry td{background:var(--green-dim) !important}
</style>
</head>
<body>

<div class="shell">
<div class="topbar">
  <div class="logo"><b>Q</b>UINT</div>
  <div class="sep"></div>
  <div class="status"><span class="dot"></span>Gateway active</div>
  <div class="right">
    <div class="counter" id="entry-counter">-- entries</div>
  </div>
</div>

<div class="sidebar">
  <a href="#" class="active" data-tab="overview" title="Overview">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  </a>
  <a href="#" data-tab="audit" title="Audit Log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
  </a>
  <a href="#" data-tab="agents" title="Agents">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </a>
  <a href="#" data-tab="approvals" title="Approvals" id="nav-approvals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  </a>
  <div class="spacer"></div>
  <a href="#" data-tab="services" title="Services">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </a>
  <a href="#" data-tab="policy" title="Policy">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </a>
</div>

<main>
  <!-- Overview -->
  <div id="tab-overview" class="tab active">
    <div class="page-header"><h1>Overview</h1></div>
    <div class="stats" id="status-cards"></div>
    <div class="feed">
      <div class="feed-header">
        <h2>Recent Activity</h2>
        <div class="live"><span class="dot"></span>Live</div>
      </div>
      <table><thead><tr><th>Time</th><th>Server</th><th>Tool</th><th>Verdict</th><th>Risk</th><th>Agent</th></tr></thead><tbody id="recent-activity"></tbody></table>
    </div>
  </div>

  <!-- Audit -->
  <div id="tab-audit" class="tab">
    <div class="page-header"><h1>Audit Log</h1></div>
    <div class="filters">
      <select id="f-verdict"><option value="">All verdicts</option><option value="allow">allow</option><option value="deny">deny</option><option value="passthrough">passthrough</option><option value="scope_denied">scope denied</option><option value="approval_pending">pending</option><option value="rate_limited">rate limited</option></select>
      <input id="f-tool" placeholder="Filter tool...">
      <input id="f-agent" placeholder="Filter agent...">
      <button class="btn btn-sm" onclick="loadAudit()">Apply</button>
    </div>
    <div class="feed">
      <table><thead><tr><th>#</th><th>Time</th><th>Dir</th><th>Method</th><th>Tool</th><th>Verdict</th><th>Risk</th><th>Agent</th></tr></thead><tbody id="audit-rows"></tbody></table>
    </div>
    <div class="pagination"><span class="info" id="audit-info"></span><div><button class="btn btn-sm" id="audit-prev" onclick="auditPage(-1)">&larr; Prev</button> <button class="btn btn-sm" id="audit-next" onclick="auditPage(1)">Next &rarr;</button></div></div>
  </div>

  <!-- Agents -->
  <div id="tab-agents" class="tab">
    <div class="page-header"><h1>Agents</h1><div class="actions"><button class="btn btn-primary" onclick="toggleCreate()">+ New Agent</button></div></div>
    <div class="create-form" id="create-form">
      <div class="form-row"><label>Name</label><input id="a-name" placeholder="research-bot"></div>
      <div class="form-row"><label>Type</label><input id="a-type" value="generic" placeholder="generic"></div>
      <div class="form-row"><label>Scopes</label><select id="a-scopes"><option value="tools:read">tools:read</option><option value="tools:write">tools:write</option><option value="tools:execute">tools:execute</option><option value="tools:admin">tools:admin</option><option value="tools:read,tools:write">read + write</option><option value="tools:admin,tools:execute">admin + execute</option></select></div>
      <div class="form-row"><label>Desc</label><input id="a-desc" placeholder="What does this agent do?"></div>
      <div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-primary" onclick="createAgent()">Create Agent</button><button class="btn" onclick="toggleCreate()">Cancel</button></div>
      <div id="new-key"></div>
    </div>
    <div class="feed">
      <table><thead><tr><th>Name</th><th>Type</th><th>Scopes</th><th>Status</th><th>Created</th><th></th></tr></thead><tbody id="agent-rows"></tbody></table>
    </div>
  </div>

  <!-- Approvals -->
  <div id="tab-approvals" class="tab">
    <div class="page-header"><h1>Pending Approvals</h1></div>
    <div id="approval-list"></div>
  </div>

  <!-- Services -->
  <div id="tab-services" class="tab">
    <div class="page-header"><h1>Connected Services</h1></div>
    <div class="section"><div class="section-body" id="services-body"></div></div>
  </div>

  <!-- Policy -->
  <div id="tab-policy" class="tab">
    <div class="page-header"><h1>Policy</h1></div>
    <div class="policy-viewer"><pre id="policy-json"></pre></div>
  </div>
</main>
</div>

<script>
const API='';let auditOffset=0;const LIMIT=50;

// Navigation
document.querySelectorAll('.sidebar a[data-tab]').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    document.querySelectorAll('.sidebar a').forEach(x=>x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.tab').forEach(d=>d.classList.remove('active'));
    document.getElementById('tab-'+a.dataset.tab).classList.add('active');
    const t=a.dataset.tab;
    if(t==='audit')loadAudit();if(t==='agents')loadAgents();if(t==='approvals')loadApprovals();
    if(t==='policy')loadPolicy();if(t==='overview')loadOverview();if(t==='services')loadServices();
  });
});

// Helpers
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function tag(text,cls){return`<span class="tag tag-${cls}">${esc(text)}</span>`}
function verdictTag(v){
  const m={allow:'green',passthrough:'blue',deny:'red',scope_denied:'red',flag_denied:'amber',rate_limited:'amber',approval_pending:'amber',approved:'green'};
  return tag(v.replace('_',' '),m[v]||'muted');
}
function riskDisplay(s,l){
  if(s==null)return'<span style="color:var(--text-3)">--</span>';
  const cls=s<30?'lo':s<60?'md':'hi';
  const color=s<30?'var(--green)':s<60?'var(--amber)':'var(--red)';
  return`<span class="risk-bar"><span class="bar"><span class="bar-fill ${cls}" style="width:${s}%"></span></span><span style="color:${color};font-size:11px">${s}</span></span>`;
}
function statusTag(s){return tag(s,{active:'green',suspended:'amber',revoked:'red'}[s]||'muted')}
function timeAgo(ts){
  if(!ts)return'--';const s=Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<5)return'now';if(s<60)return s+'s';const m=Math.floor(s/60);
  if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';
}
function timeStr(ts){
  if(!ts)return'--';return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function dateStr(ts){
  if(!ts)return'--';return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric'});
}
async function api(p,o){const r=await fetch(API+p,o);return r.json()}

// Overview
async function loadOverview(){
  const d=await api('/api/status');const a=d.audit||{};
  document.getElementById('entry-counter').textContent=(a.total_entries||0).toLocaleString()+' entries';
  document.getElementById('status-cards').innerHTML=`
    <div class="stat"><div class="label">Total Events</div><div class="value">${(a.total_entries||0).toLocaleString()}</div></div>
    <div class="stat"><div class="label">Denied</div><div class="value red">${a.denied||0}</div></div>
    <div class="stat"><div class="label">High Risk</div><div class="value amber">${a.high_risk||0}</div></div>
    <div class="stat"><div class="label">Active Agents</div><div class="value green">${d.agents_active||0}</div></div>
    <div class="stat"><div class="label">Pending</div><div class="value ${(d.approvals_pending||0)>0?'amber':''}">${d.approvals_pending||0}</div></div>`;
  if((d.approvals_pending||0)>0){
    const nav=document.getElementById('nav-approvals');
    if(!nav.querySelector('.badge-count'))nav.innerHTML+=`<span class="badge-count">${d.approvals_pending}</span>`;
  }
  const audit=await api('/api/audit?limit=12');
  const rows=(audit.entries||[]).filter(e=>e.Direction==='request');
  document.getElementById('recent-activity').innerHTML=rows.length===0
    ?`<tr><td colspan="6" class="empty"><div class="icon">~</div><div class="waiting">Waiting for your first tool call...</div><div style="margin-top:8px;font-size:11px">Run an AI agent with Quint active to see activity here</div></td></tr>`
    :rows.map(e=>`<tr>
      <td style="color:var(--text-3);font-size:11px">${timeAgo(e.Timestamp)}</td>
      <td style="color:var(--text-3);font-size:11px">${esc(e.ServerName||'--')}</td>
      <td style="color:var(--text)">${esc(e.ToolName||e.Method)}</td>
      <td>${verdictTag(e.Verdict)}</td>
      <td>${riskDisplay(e.RiskScore,e.RiskLevel)}</td>
      <td style="color:var(--text-3);font-size:11px">${esc(e.AgentName||'--')}</td>
    </tr>`).join('');
}

// Audit
async function loadAudit(){
  const v=document.getElementById('f-verdict').value;
  const t=document.getElementById('f-tool').value;
  const a=document.getElementById('f-agent').value;
  let q=`/api/audit?limit=${LIMIT}&offset=${auditOffset}`;
  if(v)q+=`&verdict=${v}`;if(t)q+=`&tool=${encodeURIComponent(t)}`;if(a)q+=`&agent=${encodeURIComponent(a)}`;
  const d=await api(q);const rows=d.entries||[];
  document.getElementById('audit-rows').innerHTML=rows.length===0
    ?'<tr><td colspan="8" class="empty">No entries match filters</td></tr>'
    :rows.map(e=>`<tr>
      <td style="color:var(--text-3);font-size:11px">${e.ID}</td>
      <td style="color:var(--text-3);font-size:11px">${timeStr(e.Timestamp)}</td>
      <td>${tag(e.Direction,e.Direction==='request'?'blue':'purple')}</td>
      <td style="font-size:11px;color:var(--text-3)">${esc(e.Method)}</td>
      <td style="color:var(--text)">${esc(e.ToolName||'--')}</td>
      <td>${verdictTag(e.Verdict)}</td>
      <td>${riskDisplay(e.RiskScore,e.RiskLevel)}</td>
      <td style="color:var(--text-3);font-size:11px">${esc(e.AgentName||'--')}</td>
    </tr>`).join('');
  document.getElementById('audit-info').textContent=`${auditOffset+1}–${auditOffset+rows.length} of ${d.total}`;
  document.getElementById('audit-prev').disabled=auditOffset===0;
  document.getElementById('audit-next').disabled=auditOffset+LIMIT>=d.total;
}
function auditPage(dir){auditOffset=Math.max(0,auditOffset+dir*LIMIT);loadAudit()}

// Agents
async function loadAgents(){
  const d=await api('/api/agents');const agents=d.agents||[];
  document.getElementById('agent-rows').innerHTML=agents.length===0
    ?'<tr><td colspan="6" class="empty"><div class="icon">~</div>No agents yet. Create one to assign scoped API keys.</td></tr>'
    :agents.map(a=>`<tr>
      <td style="color:var(--text);font-weight:500">${esc(a.Name)}</td>
      <td style="color:var(--text-3)">${esc(a.Type)}</td>
      <td>${tag(a.Scopes,'blue')}</td>
      <td>${statusTag(a.Status)}</td>
      <td style="color:var(--text-3);font-size:11px">${dateStr(a.CreatedAt)}</td>
      <td>${a.Status==='active'?`<button class="btn btn-sm" onclick="agentAction('${esc(a.Name)}','suspend')">Suspend</button> <button class="btn btn-sm btn-danger" onclick="agentAction('${esc(a.Name)}','revoke')">Revoke</button>`:a.Status==='suspended'?`<button class="btn btn-sm" onclick="agentAction('${esc(a.Name)}','activate')">Activate</button>`:'<span class="tag tag-muted">revoked</span>'}</td>
    </tr>`).join('');
}
async function agentAction(n,a){await api(`/api/agents/${n}/${a}`,{method:'POST'});loadAgents()}
function toggleCreate(){document.getElementById('create-form').classList.toggle('show');document.getElementById('new-key').innerHTML=''}
async function createAgent(){
  const n=document.getElementById('a-name').value.trim();if(!n)return;
  const d=await api('/api/agents',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,type:document.getElementById('a-type').value||'generic',scopes:document.getElementById('a-scopes').value,description:document.getElementById('a-desc').value})});
  if(d.error){alert(d.error);return}
  document.getElementById('new-key').innerHTML=`<div class="key-display">API Key — save this, it won't be shown again:<br><br><strong>${esc(d.api_key)}</strong></div>`;
  document.getElementById('a-name').value='';loadAgents();
}

// Approvals
async function loadApprovals(){
  const d=await api('/api/approvals');const p=d.pending||[];
  document.getElementById('approval-list').innerHTML=p.length===0
    ?'<div class="empty"><div class="icon" style="font-size:40px">&#10003;</div>No pending approvals</div>'
    :p.map(r=>`<div class="approval-card">
      <div class="meta">
        <div class="tool">${esc(r.ToolName)} ${riskDisplay(r.RiskScore,r.RiskLevel)}</div>
        <div class="details"><span>Agent: ${esc(r.AgentName)}</span><span>Server: ${esc(r.ServerName)}</span><span>${timeAgo(r.CreatedAt)}</span></div>
        <div class="id">${esc(r.ID)}</div>
      </div>
      <div class="actions">
        <button class="btn btn-sm" style="border-color:var(--green);color:var(--green)" onclick="approvalDecide('${esc(r.ID)}','approve')">Approve</button>
        <button class="btn btn-sm btn-danger" onclick="approvalDecide('${esc(r.ID)}','deny')">Deny</button>
      </div>
    </div>`).join('');
}
async function approvalDecide(id,a){await api(`/api/approvals/${id}/${a}`,{method:'POST'});loadApprovals();loadOverview()}

// Services
async function loadServices(){
  document.getElementById('services-body').innerHTML=`
    <div class="service-row"><div class="service-icon">gh</div><div class="service-info"><div class="name">GitHub</div><div class="scopes">OAuth &middot; repo, read:org</div></div>${tag('connected','green')}</div>
    <div class="service-row"><div class="service-icon">fs</div><div class="service-info"><div class="name">Filesystem</div><div class="scopes">stdio &middot; read, write, search</div></div>${tag('connected','green')}</div>
  `;
}

// Policy
async function loadPolicy(){
  const d=await api('/api/policy');
  const raw=JSON.stringify(d,null,2);
  document.getElementById('policy-json').innerHTML=raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/("(?:[^"\\]|\\.)*")(\s*:)/g,'<span style="color:var(--blue)">$1</span>$2')
    .replace(/:\s*("(?:[^"\\]|\\.)*")/g,': <span style="color:var(--green)">$1</span>')
    .replace(/:\s*(\d+(?:\.\d+)?)/g,': <span style="color:var(--amber)">$1</span>')
    .replace(/:\s*(true|false|null)/g,': <span style="color:var(--purple)">$1</span>');
}

// SSE
let evtSource;
function connectSSE(){
  evtSource=new EventSource(API+'/api/events');
  evtSource.onmessage=e=>{
    const data=JSON.parse(e.data);
    if(data.type==='new_entries'){
      const active=document.querySelector('.sidebar a.active');
      if(active){const t=active.dataset.tab;if(t==='overview')loadOverview();if(t==='audit')loadAudit();if(t==='approvals')loadApprovals()}
      if(data.total)document.getElementById('entry-counter').textContent=data.total.toLocaleString()+' entries';
    }
  };
  evtSource.onerror=()=>{evtSource.close();setTimeout(connectSSE,5000)};
}

loadOverview();
connectSSE();
</script>
