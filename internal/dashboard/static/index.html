<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quint Dashboard</title>
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #222; --text: #e0e0e0;
  --muted: #888; --accent: #3b82f6; --green: #22c55e; --red: #ef4444;
  --yellow: #eab308; --orange: #f97316;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
a { color: var(--accent); text-decoration: none; }

/* Layout */
.shell { display: flex; height: 100vh; }
nav { width: 200px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; display: flex; flex-direction: column; }
nav .logo { padding: 0 16px 16px; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
nav .logo span { color: var(--accent); }
nav a { display: block; padding: 8px 16px; color: var(--muted); font-size: 13px; transition: all 0.15s; }
nav a:hover, nav a.active { color: var(--text); background: rgba(255,255,255,0.04); }
nav a.active { border-right: 2px solid var(--accent); }
nav .spacer { flex: 1; }
nav .version { padding: 8px 16px; color: var(--muted); font-size: 11px; }
main { flex: 1; overflow-y: auto; padding: 24px 32px; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 16px; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.card .label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; }
.card .value { font-size: 24px; font-weight: 600; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:hover td { background: rgba(255,255,255,0.02); }
.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--accent); }
.badge-muted { background: rgba(136,136,136,0.15); color: var(--muted); }

/* Buttons */
.btn { display: inline-block; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.btn:hover { border-color: var(--accent); }
.btn-green { border-color: var(--green); color: var(--green); }
.btn-green:hover { background: rgba(34,197,94,0.1); }
.btn-red { border-color: var(--red); color: var(--red); }
.btn-red:hover { background: rgba(239,68,68,0.1); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.9; }

/* Forms */
.form-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.form-row label { font-size: 12px; color: var(--muted); min-width: 70px; }
input, select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; }
input:focus, select:focus { outline: none; border-color: var(--accent); }

/* Pagination */
.pagination { display: flex; gap: 8px; align-items: center; margin-top: 12px; justify-content: space-between; }
.pagination .info { font-size: 12px; color: var(--muted); }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filters input, .filters select { min-width: 120px; }

/* Section */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }

/* Create form */
.create-form { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; display: none; }
.create-form.show { display: block; }
.key-display { background: var(--bg); border: 1px solid var(--green); border-radius: 6px; padding: 12px; margin-top: 12px; font-family: monospace; font-size: 12px; word-break: break-all; color: var(--green); }

/* Empty state */
.empty { text-align: center; padding: 32px; color: var(--muted); }
</style>
</head>
<body>
<div class="shell">
  <nav>
    <div class="logo"><span>Q</span>uint</div>
    <a href="#overview" class="active" data-tab="overview">Overview</a>
    <a href="#audit" data-tab="audit">Audit Log</a>
    <a href="#agents" data-tab="agents">Agents</a>
    <a href="#approvals" data-tab="approvals">Approvals</a>
    <a href="#policy" data-tab="policy">Policy</a>
    <div class="spacer"></div>
    <div class="version">quint-proxy dev</div>
  </nav>
  <main>
    <!-- Overview -->
    <div id="tab-overview">
      <h1>Overview</h1>
      <div class="cards" id="status-cards"></div>
      <div class="section">
        <h2>Recent Activity</h2>
        <table><thead><tr><th>Time</th><th>Tool</th><th>Verdict</th><th>Agent</th><th>Risk</th></tr></thead><tbody id="recent-activity"></tbody></table>
      </div>
    </div>

    <!-- Audit -->
    <div id="tab-audit" style="display:none">
      <h1>Audit Log</h1>
      <div class="filters">
        <select id="f-verdict"><option value="">All verdicts</option><option value="allow">allow</option><option value="deny">deny</option><option value="passthrough">passthrough</option><option value="scope_denied">scope_denied</option><option value="approval_pending">approval_pending</option><option value="rate_limited">rate_limited</option></select>
        <input id="f-tool" placeholder="Tool name...">
        <input id="f-agent" placeholder="Agent name...">
        <button class="btn" onclick="loadAudit()">Filter</button>
      </div>
      <table><thead><tr><th>ID</th><th>Time</th><th>Dir</th><th>Method</th><th>Tool</th><th>Verdict</th><th>Risk</th><th>Agent</th></tr></thead><tbody id="audit-rows"></tbody></table>
      <div class="pagination"><span class="info" id="audit-info"></span><div><button class="btn" id="audit-prev" onclick="auditPage(-1)">Prev</button> <button class="btn" id="audit-next" onclick="auditPage(1)">Next</button></div></div>
    </div>

    <!-- Agents -->
    <div id="tab-agents" style="display:none">
      <h1>Agents <button class="btn btn-primary" onclick="toggleCreate()" style="margin-left:12px;font-size:12px">+ Create</button></h1>
      <div class="create-form" id="create-form">
        <div class="form-row"><label>Name</label><input id="a-name" placeholder="research-bot"></div>
        <div class="form-row"><label>Type</label><input id="a-type" placeholder="generic" value="generic"></div>
        <div class="form-row"><label>Scopes</label><select id="a-scopes"><option value="tools:read">tools:read</option><option value="tools:write">tools:write</option><option value="tools:execute">tools:execute</option><option value="tools:admin">tools:admin</option><option value="tools:read,tools:write">tools:read,tools:write</option><option value="tools:admin,tools:execute">tools:admin,tools:execute</option></select></div>
        <div class="form-row"><label>Desc</label><input id="a-desc" placeholder="Optional description"></div>
        <button class="btn btn-primary" onclick="createAgent()">Create Agent</button>
        <div id="new-key"></div>
      </div>
      <table><thead><tr><th>Name</th><th>Type</th><th>Scopes</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead><tbody id="agent-rows"></tbody></table>
    </div>

    <!-- Approvals -->
    <div id="tab-approvals" style="display:none">
      <h1>Pending Approvals</h1>
      <div id="approval-list"></div>
    </div>

    <!-- Policy -->
    <div id="tab-policy" style="display:none">
      <h1>Policy</h1>
      <pre id="policy-json" class="section mono" style="white-space:pre-wrap;font-size:12px;max-height:80vh;overflow:auto"></pre>
    </div>
  </main>
</div>

<script>
const API = '';
let auditOffset = 0;
const LIMIT = 50;

// Navigation
document.querySelectorAll('nav a[data-tab]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('main > div').forEach(d => d.style.display = 'none');
    document.getElementById('tab-' + a.dataset.tab).style.display = '';
    if (a.dataset.tab === 'audit') loadAudit();
    if (a.dataset.tab === 'agents') loadAgents();
    if (a.dataset.tab === 'approvals') loadApprovals();
    if (a.dataset.tab === 'policy') loadPolicy();
    if (a.dataset.tab === 'overview') loadOverview();
  });
});

// Helpers
function badge(text, cls) { return `<span class="badge badge-${cls}">${esc(text)}</span>`; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function verdictBadge(v) {
  const m = {allow:'green',passthrough:'blue',deny:'red',scope_denied:'red',flag_denied:'orange',rate_limited:'yellow',approval_pending:'yellow',approved:'green'};
  return badge(v, m[v] || 'muted');
}
function riskBadge(score, level) {
  if (score == null) return '<span class="badge badge-muted">-</span>';
  const m = {low:'green',medium:'yellow',high:'orange',critical:'red'};
  return badge(score + ' ' + (level||''), m[level] || 'muted');
}
function statusBadge(s) {
  const m = {active:'green',suspended:'yellow',revoked:'red'};
  return badge(s, m[s] || 'muted');
}
function timeAgo(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ' + d.toLocaleDateString([], {month:'short',day:'numeric'});
}

async function api(path, opts) {
  const r = await fetch(API + path, opts);
  return r.json();
}

// Overview
async function loadOverview() {
  const data = await api('/api/status');
  const a = data.audit || {};
  document.getElementById('status-cards').innerHTML = `
    <div class="card"><div class="label">Audit Entries</div><div class="value">${a.total_entries || 0}</div></div>
    <div class="card"><div class="label">Denied</div><div class="value" style="color:var(--red)">${a.denied || 0}</div></div>
    <div class="card"><div class="label">High Risk</div><div class="value" style="color:var(--orange)">${a.high_risk || 0}</div></div>
    <div class="card"><div class="label">Active Agents</div><div class="value" style="color:var(--green)">${data.agents_active || 0}</div></div>
    <div class="card"><div class="label">Pending Approvals</div><div class="value" style="color:var(--yellow)">${data.approvals_pending || 0}</div></div>
  `;
  const audit = await api('/api/audit?limit=10');
  const rows = (audit.entries || []).filter(e => e.Direction === 'request');
  document.getElementById('recent-activity').innerHTML = rows.length === 0
    ? '<tr><td colspan="5" class="empty">No activity yet</td></tr>'
    : rows.map(e => `<tr>
        <td>${timeAgo(e.Timestamp)}</td>
        <td class="mono">${esc(e.ToolName || e.Method)}</td>
        <td>${verdictBadge(e.Verdict)}</td>
        <td>${esc(e.AgentName || '-')}</td>
        <td>${riskBadge(e.RiskScore, e.RiskLevel)}</td>
      </tr>`).join('');
}

// Audit
async function loadAudit() {
  const v = document.getElementById('f-verdict').value;
  const t = document.getElementById('f-tool').value;
  const a = document.getElementById('f-agent').value;
  let q = `/api/audit?limit=${LIMIT}&offset=${auditOffset}`;
  if (v) q += `&verdict=${v}`;
  if (t) q += `&tool=${encodeURIComponent(t)}`;
  if (a) q += `&agent=${encodeURIComponent(a)}`;
  const data = await api(q);
  const rows = data.entries || [];
  document.getElementById('audit-rows').innerHTML = rows.length === 0
    ? '<tr><td colspan="8" class="empty">No entries</td></tr>'
    : rows.map(e => `<tr>
        <td class="mono">${e.ID}</td>
        <td>${timeAgo(e.Timestamp)}</td>
        <td>${esc(e.Direction)}</td>
        <td class="mono">${esc(e.Method)}</td>
        <td class="mono">${esc(e.ToolName || '-')}</td>
        <td>${verdictBadge(e.Verdict)}</td>
        <td>${riskBadge(e.RiskScore, e.RiskLevel)}</td>
        <td>${esc(e.AgentName || '-')}</td>
      </tr>`).join('');
  document.getElementById('audit-info').textContent = `Showing ${auditOffset+1}–${auditOffset+rows.length} of ${data.total}`;
  document.getElementById('audit-prev').disabled = auditOffset === 0;
  document.getElementById('audit-next').disabled = auditOffset + LIMIT >= data.total;
}
function auditPage(dir) { auditOffset = Math.max(0, auditOffset + dir * LIMIT); loadAudit(); }

// Agents
async function loadAgents() {
  const data = await api('/api/agents');
  const agents = data.agents || [];
  document.getElementById('agent-rows').innerHTML = agents.length === 0
    ? '<tr><td colspan="6" class="empty">No agents. Create one to get started.</td></tr>'
    : agents.map(a => `<tr>
        <td><strong>${esc(a.Name)}</strong></td>
        <td>${esc(a.Type)}</td>
        <td class="mono">${esc(a.Scopes)}</td>
        <td>${statusBadge(a.Status)}</td>
        <td>${timeAgo(a.CreatedAt)}</td>
        <td>${a.Status==='active' ? `<button class="btn btn-red" onclick="agentAction('${esc(a.Name)}','suspend')">Suspend</button> <button class="btn btn-red" onclick="agentAction('${esc(a.Name)}','revoke')">Revoke</button>` : a.Status==='suspended' ? `<button class="btn btn-green" onclick="agentAction('${esc(a.Name)}','activate')">Activate</button> <button class="btn btn-red" onclick="agentAction('${esc(a.Name)}','revoke')">Revoke</button>` : '<span class="badge badge-muted">revoked</span>'}</td>
      </tr>`).join('');
}
async function agentAction(name, action) {
  await api(`/api/agents/${name}/${action}`, {method:'POST'});
  loadAgents();
}
function toggleCreate() { document.getElementById('create-form').classList.toggle('show'); document.getElementById('new-key').innerHTML = ''; }
async function createAgent() {
  const name = document.getElementById('a-name').value.trim();
  if (!name) return;
  const data = await api('/api/agents', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      type: document.getElementById('a-type').value || 'generic',
      scopes: document.getElementById('a-scopes').value,
      description: document.getElementById('a-desc').value,
    })
  });
  if (data.error) { alert(data.error); return; }
  document.getElementById('new-key').innerHTML = `<div class="key-display">API Key (save this — shown once):<br><br>${esc(data.api_key)}</div>`;
  document.getElementById('a-name').value = '';
  loadAgents();
}

// Approvals
async function loadApprovals() {
  const data = await api('/api/approvals');
  const pending = data.pending || [];
  document.getElementById('approval-list').innerHTML = pending.length === 0
    ? '<div class="empty">No pending approvals</div>'
    : pending.map(r => `<div class="section">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div>
            <strong class="mono">${esc(r.ToolName)}</strong> ${riskBadge(r.RiskScore, r.RiskLevel)}<br>
            <span style="color:var(--muted);font-size:12px">Agent: ${esc(r.AgentName)} · Server: ${esc(r.ServerName)} · ${timeAgo(r.CreatedAt)}</span><br>
            <span class="mono" style="font-size:11px;color:var(--muted)">ID: ${esc(r.ID)}</span>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-green" onclick="approvalDecide('${esc(r.ID)}','approve')">Approve</button>
            <button class="btn btn-red" onclick="approvalDecide('${esc(r.ID)}','deny')">Deny</button>
          </div>
        </div>
      </div>`).join('');
}
async function approvalDecide(id, action) {
  await api(`/api/approvals/${id}/${action}`, {method:'POST'});
  loadApprovals();
  loadOverview();
}

// Policy
async function loadPolicy() {
  const data = await api('/api/policy');
  document.getElementById('policy-json').textContent = JSON.stringify(data, null, 2);
}

// Init
loadOverview();
</script>
</body>
</html>
