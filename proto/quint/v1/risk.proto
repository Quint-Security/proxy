syntax = "proto3";

package quint.v1;

option go_package = "github.com/Quint-Security/quint-proxy/proto/quint/v1;quintv1";

// RiskService provides ML-enhanced risk scoring for tool calls.
service RiskService {
  // ScoreToolCall evaluates the risk of an MCP tool call.
  rpc ScoreToolCall(ScoreToolCallRequest) returns (ScoreToolCallResponse);
}

message ScoreToolCallRequest {
  // MCP tool name being called.
  string tool_name = 1;
  // JSON-encoded arguments.
  string arguments_json = 2;
  // Subject making the call (API key ID, session, or "anonymous").
  string subject_id = 3;
  // Server name the tool belongs to.
  string server_name = 4;
  // Local risk score (0-100) computed by the proxy's built-in engine.
  int32 local_score = 5;
  // Local risk level ("low", "medium", "high", "critical").
  string local_level = 6;
}

message ScoreToolCallResponse {
  // Enhanced risk score (0-100).
  int32 score = 1;
  // Risk level ("low", "medium", "high", "critical").
  string level = 2;
  // Human-readable reasons contributing to the score.
  repeated string reasons = 3;
  // Whether the remote service contributed to the score.
  bool enhanced = 4;
}
